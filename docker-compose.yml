services:
  backend:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - workspace_data:/workspace_data
    depends_on:
      - ollama
      - searxng

  web:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles:
      - llamacpp
    ports:
      - "8081:8080"
    volumes:
      - ./models:/models
    command: ["-m", "/models/model.gguf", "--host", "0.0.0.0", "--port", "8080"]

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/

  mcp-workspace:
    build:
      context: ./mcp_servers
    profiles:
      - mcp
    environment:
      WORKSPACE_ROOT: /workspace_data
    volumes:
      - workspace_data:/workspace_data
    command: ["python", "workspace_server.py"]

  mcp-search:
    build:
      context: ./mcp_servers
    profiles:
      - mcp
    environment:
      SEARXNG_BASE_URL: http://searxng:8080
    depends_on:
      - searxng
    command: ["python", "web_search_server.py"]

volumes:
  ollama:
  workspace_data:
