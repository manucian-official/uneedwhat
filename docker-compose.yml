version: '3.9'

services:
  # ============================================================================
  # DATABASE
  # ============================================================================

  postgres:
    image: postgres:14-alpine
    container_name: uneedwhat-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-uneedwhat}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - uneedwhat-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # CACHE
  # ============================================================================

  redis:
    image: redis:7-alpine
    container_name: uneedwhat-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - uneedwhat-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # BACKEND API
  # ============================================================================

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: uneedwhat-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_NAME: uneedwhat
      APP_PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-uneedwhat}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_SSL: 'false'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-30d}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@uneedwhat.com}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-uneedwhat-uploads}
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
    networks:
      - uneedwhat-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ============================================================================
  # FRONTEND
  # ============================================================================

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    container_name: uneedwhat-frontend
    environment:
      VITE_APP_NAME: uneedwhat
      VITE_API_URL: http://localhost:3000/api/v1
      VITE_API_TIMEOUT: 30000
      VITE_WS_URL: ws://localhost:3000
      VITE_ENABLE_ANALYTICS: 'true'
      VITE_ENABLE_NOTIFICATIONS: 'true'
      VITE_ENABLE_VIDEO_INTERVIEW: ${VITE_ENABLE_VIDEO_INTERVIEW:-false}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - uneedwhat-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5173']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # NGINX REVERSE PROXY
  # ============================================================================

  nginx:
    image: nginx:alpine
    container_name: uneedwhat-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - uneedwhat-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:80']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # LOGGING (Optional - ELK Stack)
  # ============================================================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: uneedwhat-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - uneedwhat-network
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    profiles:
      - logging

  logstash:
    image: docker.elastic.co/logstash/logstash:8.5.0
    container_name: uneedwhat-logstash
    volumes:
      - ./docker/logstash/config:/usr/share/logstash/config:ro
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5000:5000/tcp"
      - "5000:5000/udp"
    depends_on:
      - elasticsearch
    networks:
      - uneedwhat-network
    restart: unless-stopped
    profiles:
      - logging

  kibana:
    image: docker.elastic.co/kibana/kibana:8.5.0
    container_name: uneedwhat-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - uneedwhat-network
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:5601/api/status || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    profiles:
      - logging

  # ============================================================================
  # MONITORING (Optional - Prometheus & Grafana)
  # ============================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: uneedwhat-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - uneedwhat-network
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: uneedwhat-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - uneedwhat-network
    restart: unless-stopped
    profiles:
      - monitoring

  # ============================================================================
  # MAIL SERVER (Optional - for email testing)
  # ============================================================================

  mailhog:
    image: mailhog/mailhog:latest
    container_name: uneedwhat-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - uneedwhat-network
    restart: unless-stopped
    profiles:
      - optional

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  uneedwhat-network:
    driver: bridge

# ============================================================================
# USAGE NOTES
# ============================================================================

# Start the entire stack:
#   docker-compose up -d
#
# Start with logging enabled:
#   docker-compose --profile logging up -d
#
# Start with monitoring enabled:
#   docker-compose --profile monitoring up -d
#
# Start with all optional services:
#   docker-compose --profile logging --profile monitoring --profile optional up -d
#
# View logs:
#   docker-compose logs -f backend
#   docker-compose logs -f frontend
#
# Stop the stack:
#   docker-compose down
#
# Remove volumes (careful!):
#   docker-compose down -v
#
# Access services:
#   Frontend: http://localhost:5173
#   Backend: http://localhost:3000
#   Nginx: http://localhost:80
#   Kibana: http://localhost:5601 (if logging enabled)
#   Grafana: http://localhost:3001 (if monitoring enabled)
#   MailHog: http://localhost:8025 (if optional enabled)
#
# Database access:
#   psql -h localhost -U postgres -d uneedwhat
#
# Redis access:
#   redis-cli -p 6379
