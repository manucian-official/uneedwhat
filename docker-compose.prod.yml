services:
  backend:
    restart: unless-stopped
    environment:
      APP_ENV: production
      CORS_ORIGINS: http://localhost,http://127.0.0.1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
    environment:
      VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports: !override
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  ollama:
    restart: unless-stopped

  searxng:
    restart: unless-stopped

  mcp-workspace:
    build:
      context: ./mcp_servers
    profiles:
      - mcp
    environment:
      WORKSPACE_ROOT: /workspace_data
    volumes:
      - workspace_data:/workspace_data
    command: ["python", "workspace_server.py"]
    restart: unless-stopped

  mcp-search:
    build:
      context: ./mcp_servers
    profiles:
      - mcp
    environment:
      SEARXNG_BASE_URL: http://searxng:8080
    depends_on:
      - searxng
    command: ["python", "web_search_server.py"]
    restart: unless-stopped
